name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libgpgme-dev gnupg2 gpgsm pinentry-curses pkg-config
      - name: Check
        run: cargo check
      - name: Test
        run: cargo test
